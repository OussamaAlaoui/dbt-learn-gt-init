stages:
  - validate
  - test

before_script:
  - pip install dbt-bigquery
  - echo "$GCP_SERVICE_ACCOUNT_KEY" > /tmp/gcp_key.json
  - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json

validate_dbt_project:
  stage: validate
  image: python:3.11
  script:
    - dbt compile --project-dir dbt_project.yml

run_dbt_tests:
  stage: test
  image: python:3.11
  script:
    - dbt test --project-dir dbt_project.yml